image: "gitlab.bayer.com:4567/gbbfx/mondep:latest"

stages:
  - build

build-job:
  stage: build
  script:
    - cmake -B ./build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=On -DCMAKE_SHARED_LINKER_FLAGS="-static" . && cd ./build && ninja
  artifacts:
    paths:
      - ./bin/cdmcli
      - ./bin/libcdm.so