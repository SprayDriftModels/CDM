stages:          # List of stages for jobs, and their order of execution
  - build
  - test

build-job:
  stage: build
  script:
    - apk update && apk add --no-cache pkgconfig autoconf build-base binutils cmake curl file gcc g++ git libgcc libtool linux-headers make musl-dev ninja tar zip unzip wget
    - git clone https://github.com/Microsoft/vcpkg.git
    - cd vcpkg
    - ./bootstrap-vcpkg.sh --useSystemBinaries
    - cp ./triplets/x64-linux.cmake ./triplets/x64-linux-static.cmake
    - sed -i -e 's/dynamic/static/g' ./triplets/x64-linux-static.cmake
    - ./vcpkg install blaze:x64-linux-static
    - ./vcpkg install boost-math:x64-linux-static
    - ./vcpkg install fmt:x64-linux-static
    - ./vcpkg install nlohmann-json:x64-linux-static
    - ./vcpkg install ceres:x64-linux-static
    - ./vcpkg install sundials:x64-linux-static

test-job:
  stage: test
  script:
    - echo "Running tests..."
